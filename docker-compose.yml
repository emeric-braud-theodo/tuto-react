services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - "./bff:/app"
