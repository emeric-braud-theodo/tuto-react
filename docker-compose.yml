services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONT_PORT}:8080"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_BFF_URL=${REACT_APP_BFF_URL}
    volumes:
      - "./frontend:/app"
  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    ports:
      - "${BFF_PORT}:3000"
    environment:
      - FRONT_URL=${FRONT_URL}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_URL=${DB_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
    volumes:
      - "./bff:/app"
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
